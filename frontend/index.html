<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Document Q&A</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 16px;
            font-size: 1.5rem;
        }
        
        .upload-zone {
            border: 3px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }
        
        .upload-zone:hover {
            background: #eef0ff;
            border-color: #764ba2;
        }
        
        .upload-zone.dragover {
            background: #e0e4ff;
            border-color: #764ba2;
            transform: scale(1.02);
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .query-section {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        
        .query-input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .query-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .document-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .document-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .document-item:last-child {
            border-bottom: none;
        }
        
        .document-info {
            flex: 1;
        }
        
        .document-name {
            font-weight: 600;
            color: #333;
        }
        
        .document-chunks {
            font-size: 13px;
            color: #666;
        }
        
        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .delete-btn:hover {
            background: #ff3344;
        }
        
        .answer-section {
            background: #f8f9ff;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .answer-title {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 12px;
        }
        
        .answer-text {
            line-height: 1.6;
            color: #333;
        }
        
        .results {
            margin-top: 20px;
        }
        
        .result-item {
            background: white;
            border-left: 4px solid #667eea;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 0 8px 8px 0;
        }
        
        .result-source {
            font-size: 12px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .result-content {
            font-size: 14px;
            color: #555;
            line-height: 1.5;
        }
        
        .status {
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            text-align: center;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 RAG Document Q&A</h1>
        
        <!-- Upload Section -->
        <div class="card">
            <h2>Upload Documents</h2>
            <div class="upload-zone" id="uploadZone">
                <div class="upload-icon">📄</div>
                <p>Drag & drop files here or click to browse</p>
                <p style="color: #666; margin-top: 8px; font-size: 14px;">Supported: PDF, DOCX, TXT, MD</p>
                <input type="file" id="fileInput" accept=".pdf,.docx,.txt,.md" multiple>
            </div>
            <div id="uploadStatus"></div>
        </div>
        
        <!-- Documents List -->
        <div class="card">
            <h2>Uploaded Documents</h2>
            <div class="document-list" id="documentList">
                <div class="empty-state">No documents uploaded yet</div>
            </div>
        </div>
        
        <!-- Query Section -->
        <div class="card">
            <h2>Ask Questions</h2>
            <div class="query-section">
                <input type="text" class="query-input" id="queryInput" placeholder="Ask a question about your documents...">
                <button class="btn" id="queryBtn">Ask</button>
            </div>
            <div id="answerSection"></div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';
        
        // Upload Zone
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const uploadStatus = document.getElementById('uploadStatus');
        
        uploadZone.addEventListener('click', () => fileInput.click());
        
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });
        
        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });
        
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });
        
        async function handleFiles(files) {
            for (let file of files) {
                await uploadFile(file);
            }
            loadDocuments();
        }
        
        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);
            
            uploadStatus.innerHTML = '<div class="status">Uploading ' + file.name + '...</div>';
            
            try {
                const response = await fetch(API_BASE + '/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    uploadStatus.innerHTML = '<div class="status success">✓ ' + file.name + ' uploaded successfully (' + result.data.chunks_added + ' chunks)</div>';
                } else {
                    uploadStatus.innerHTML = '<div class="status error">✗ Failed to upload ' + file.name + ': ' + result.detail + '</div>';
                }
            } catch (error) {
                uploadStatus.innerHTML = '<div class="status error">✗ Failed to upload ' + file.name + ': ' + error.message + '</div>';
            }
        }
        
        async function loadDocuments() {
            try {
                const response = await fetch(API_BASE + '/documents');
                const data = await response.json();
                
                const list = document.getElementById('documentList');
                
                if (data.documents.length === 0) {
                    list.innerHTML = '<div class="empty-state">No documents uploaded yet</div>';
                    return;
                }
                
                list.innerHTML = data.documents.map(doc => `
                    <div class="document-item">
                        <div class="document-info">
                            <div class="document-name">📄 ${doc.filename}</div>
                            <div class="document-chunks">${doc.chunk_count} chunks</div>
                        </div>
                        <button class="delete-btn" onclick="deleteDocument('${doc.document_id}')">Delete</button>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Failed to load documents:', error);
            }
        }
        
        async function deleteDocument(docId) {
            if (!confirm('Are you sure you want to delete this document?')) return;
            
            try {
                const response = await fetch(API_BASE + '/documents/' + docId, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    loadDocuments();
                } else {
                    alert('Failed to delete document');
                }
            } catch (error) {
                alert('Failed to delete document: ' + error.message);
            }
        }
        
        // Query
        const queryInput = document.getElementById('queryInput');
        const queryBtn = document.getElementById('queryBtn');
        const answerSection = document.getElementById('answerSection');
        
        queryBtn.addEventListener('click', askQuestion);
        queryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') askQuestion();
        });
        
        async function askQuestion() {
            const query = queryInput.value.trim();
            if (!query) return;
            
            queryBtn.disabled = true;
            queryBtn.innerHTML = '<span class="loading"></span>';
            
            try {
                const response = await fetch(API_BASE + '/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        query: query,
                        top_k: 5
                    })
                });
                
                const result = await response.json();
                
                let html = `
                    <div class="answer-section">
                        <div class="answer-title">Answer:</div>
                        <div class="answer-text">${escapeHtml(result.answer)}</div>
                    </div>
                `;
                
                if (result.results && result.results.length > 0) {
                    html += '<div class="results"><h3 style="margin-bottom: 12px;">Sources:</h3>';
                    result.results.forEach((r, i) => {
                        html += `
                            <div class="result-item">
                                <div class="result-source">Source ${i + 1}: ${r.metadata.filename}</div>
                                <div class="result-content">${escapeHtml(r.content)}</div>
                            </div>
                        `;
                    });
                    html += '</div>';
                }
                
                answerSection.innerHTML = html;
            } catch (error) {
                answerSection.innerHTML = '<div class="status error">Query failed: ' + error.message + '</div>';
            } finally {
                queryBtn.disabled = false;
                queryBtn.innerHTML = 'Ask';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Load documents on page load
        loadDocuments();
    </script>
</body>
</html>
